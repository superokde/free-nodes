name: Update Free Nodes
on:
  schedule:
    # Daily at 00:00 Beijing time (UTC+8) = 16:00 UTC previous day
    - cron: '0 16 * * *'
  workflow_dispatch:
    inputs:
      verbose:
        description: 'Enable verbose logging'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  update-nodes:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect and aggregate nodes
        env:
          TZ: Asia/Shanghai
        run: python main.py

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nodes/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🔁 Auto update nodes [$(TZ=Asia/Shanghai date +'%Y-%m-%d %H:%M') Beijing]"
            git push
          fi
